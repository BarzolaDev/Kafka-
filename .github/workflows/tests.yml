name: tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: instalar dependencias
        run: pip install kafka-python testcontainers pytest
      - name: correr tests
        run: pytest test_kafka.py -v